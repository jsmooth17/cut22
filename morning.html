<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Morning — Cut</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d6e6b;--surf:rgba(255,255,255,.10);--surf2:rgba(255,255,255,.06);
  --text:#fff;--muted:rgba(255,255,255,.6);--border:rgba(255,255,255,.15);
  --accent:#4fd1c5;--gold:#f5c842;--radius:14px;
  --green:#52c41a;--green-l:rgba(82,196,26,.15);
}
html,body{height:100%;background:linear-gradient(160deg,#0d6e6b 0%,#044d4b 60%,#032e2c 100%);background-attachment:fixed}
body{font-family:'DM Sans',sans-serif;color:var(--text);font-size:15px;line-height:1.5;min-height:100vh;padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0)}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 40px}

/* Header */
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.top-label{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;opacity:.6}
.top-day{font-size:13px;font-weight:600;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:20px}
.hero-time{font-size:clamp(2rem,8vw,3rem);font-weight:700;letter-spacing:-.02em;line-height:1;margin-bottom:4px}
.hero-date{font-size:14px;opacity:.65;margin-bottom:20px}
.hero-mantra{font-size:17px;font-weight:600;opacity:.9;margin-bottom:24px;line-height:1.3}

/* Targets strip */
.targets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:22px}
.target{background:var(--surf);border:1px solid var(--border);border-radius:11px;padding:12px 10px;text-align:center}
.target .tv{font-size:20px;font-weight:700;color:var(--accent)}
.target .tl{font-size:11px;opacity:.6;margin-top:2px}

/* Section */
.section-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.5;margin-bottom:8px}

/* Exercise list */
.ex-list{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:6px}
.warmup-row{padding:11px 14px;font-size:13px;opacity:.75;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px}
.warmup-row .wi{opacity:.7;flex-shrink:0;margin-top:1px}
.ex-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-cat-row{padding:6px 14px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.04);color:var(--accent);border-bottom:1px solid var(--border)}
.ex-name{font-weight:600;font-size:14px}
.ex-note-sm{font-size:11px;opacity:.55;margin-top:1px}
.ex-sets{font-size:12px;font-weight:600;background:rgba(255,255,255,.1);padding:3px 8px;border-radius:6px;white-space:nowrap;text-align:center}
.ex-reps{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap;text-align:right;min-width:60px}

/* Meal list */
.meal-list{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:6px}
.meal-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border)}
.meal-row:last-child{border-bottom:none}
.meal-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;opacity:.5;width:54px;flex-shrink:0}
.meal-name-sm{font-weight:600;font-size:14px}
.meal-desc-sm{font-size:11px;opacity:.55;margin-top:1px}
.meal-pro{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap}

/* Protein bar */
.pro-bar-wrap{background:var(--surf);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:22px;display:flex;align-items:center;gap:12px}
.pro-bar-track{flex:1;height:6px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}
.pro-bar-fill{height:100%;border-radius:999px;background:var(--gold);transition:width .5s}
.pro-bar-label{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap}

/* CTA */
.cta{display:flex;align-items:center;justify-content:center;gap:10px;padding:15px;border-radius:var(--radius);background:rgba(255,255,255,.12);border:1px solid var(--border);text-decoration:none;color:#fff;font-weight:700;font-size:15px;transition:background .15s;margin-top:8px}
.cta:hover{background:rgba(255,255,255,.18)}
.cta.dashboard{margin-top:12px;background:rgba(255,255,255,.07);font-size:13px;font-weight:500;opacity:.7}
.off-plan{text-align:center;padding:60px 20px;opacity:.6;font-size:15px}
.off-plan .big{font-size:48px;margin-bottom:12px}
</style>
</head>

function getDayNum(){
  const param = new URLSearchParams(location.search).get('day');
  if(param){ const n = parseInt(param); if(n>=1&&n<=22) return n; }
  const now = new Date();
  const diff = Math.floor((now - CUT_START) / 86400000);
  return diff >= 0 && diff < 22 ? diff + 1 : null;
}

function render(){
  const dayNum = getDayNum();
  const now = new Date();
  const timeStr = now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const dateStr = now.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'});

  if(!dayNum){
    document.getElementById('content').innerHTML = `<div class="off-plan"><div class="big">🏁</div><p>Cut ${now < CUT_START ? 'starts May 16' : 'complete. Well done.'}.</p></div>`;
    return;
  }

  const p = PLAN[dayNum-1];
  const pg = getProteinGoal(dayNum);
  const totalPro = p.meals.reduce((s,m)=>s+m.pro,0);
  const progPct = Math.min(100, Math.round(totalPro/pg*100));
  document.getElementById('top-day').textContent = `Day ${dayNum} of 22`;

  // Group exercises by category
  const cats = [...new Set(p.exercises.map(e=>e.category))];
  const exHTML = cats.map(cat=>{
    const exes = p.exercises.filter(e=>e.category===cat);
    return `<div class="ex-cat-row">${cat}</div>`+exes.map(e=>`
      <div class="ex-row">
        <div><div class="ex-name">${e.name}</div>${e.note?`<div class="ex-note-sm">${e.note}</div>`:''}</div>
        <div class="ex-sets">${e.sets} sets</div>
        <div class="ex-reps">${e.reps}</div>
      </div>`).join('');
  }).join('');

  const mealsHTML = p.meals.map(m=>`
    <div class="meal-row">
      <div class="meal-tag">${m.t}</div>
      <div><div class="meal-name-sm">${m.n}</div><div class="meal-desc-sm">${m.d}</div></div>
      <div class="meal-pro">${m.pro}g</div>
    </div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="hero-time">${timeStr}</div>
    <div class="hero-date">${dateStr}</div>
    <div class="hero-mantra">${getMantra(p.type)}</div>

    <div class="targets">
      <div class="target"><div class="tv">30+</div><div class="tl">min intense</div></div>
      <div class="target"><div class="tv">${pg}g</div><div class="tl">protein</div></div>
      <div class="target"><div class="tv">2.8L</div><div class="tl">water</div></div>
    </div>

    <div class="section-label">💪 Today's workout — ${p.type}</div>
    <div class="ex-list">
      <div class="warmup-row"><span class="wi">🔥</span><span>Warm-up: ${p.warmup}</span></div>
      ${exHTML}
    </div>

    <div class="section-label" style="margin-top:18px">🍽️ Meals — ${totalPro}g protein planned</div>
    <div class="meal-list">${mealsHTML}</div>
    <div class="pro-bar-wrap">
      <span style="font-size:12px;opacity:.6">Protein plan</span>
      <div class="pro-bar-track"><div class="pro-bar-fill" style="width:${progPct}%"></div></div>
      <span class="pro-bar-label">${totalPro}g / ${pg}g</span>
    </div>

    <a class="cta" id="evening-link" href="evening.html">🌙 Log tonight →</a>
    <a class="cta dashboard" href="cut22.html">↗ Full dashboard</a>
  `;
}

render();

// Keep ?day= param on cross-page links
const dayParam = new URLSearchParams(location.search).get('day');
if(dayParam){
  const el = document.getElementById('evening-link');
  if(el) el.href = `evening.html?day=${dayParam}`;
}
</script>
