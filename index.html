<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Family Training</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ee;--surf:#fff;--surf2:#f0ede6;--text:#1c1a16;--muted:#7a7368;
  --border:#ddd8cf;--radius:16px;--shadow:0 2px 14px rgba(0,0,0,.06);
  --ac:#0d6e6b;--ac-l:#e0f2f1;
  --green:#3a7d0a;--green-l:#eaf4df;--green-b:#b0d98a;
  --gold:#b8860b;--gold-l:#fbf3da;--gold-b:#e8cf8a;
  --danger:#b03030;--danger-l:#fdeaea;
  /* 2-level hierarchy colors (Option A: Green Ramp) */
  --l1bg:#e6f2d9;--l1bd:#cfe3b3;--l1fg:#4a7a1e;
  --l2bg:#7cb342;--l2bd:#689f38;--l2fg:#ffffff;
  --l3bg:#33691e;--l3bd:#234d13;--l3fg:#ffffff;--l3ring:#ffd60a;
}
html,body{min-height:100%;background:var(--bg)}
body{font-family:'DM Sans',sans-serif;color:var(--text);font-size:15px;line-height:1.5;padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left)}
.wrap{max-width:600px;margin:0 auto;padding:24px 16px 130px}
a{color:inherit}

.head{margin-bottom:22px}
.eyebrow{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
h1{font-size:clamp(1.8rem,6vw,2.4rem);font-weight:700;letter-spacing:-.02em;line-height:1.05}
.home-actions{display:flex;gap:8px;margin-top:14px}
.pill{padding:9px 14px;border-radius:999px;border:1.5px solid var(--border);background:var(--surf);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);transition:all .15s}
.pill:hover{background:var(--surf2)}

.section-label{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.tcard{display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;padding:18px 8px 14px;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden}
.tcard:active{transform:scale(.97)}
.tcard:hover{box-shadow:0 4px 18px rgba(0,0,0,.10)}
.tcard .accent-bar{position:absolute;left:0;right:0;top:0;height:4px;background:var(--ca)}
.tcard .ic{width:54px;height:54px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--ca-l);margin-top:4px}
.tcard .t-name{font-weight:700;font-size:14px;letter-spacing:-.01em;line-height:1.15}
.tcard .t-sub{font-size:11px;color:var(--muted);line-height:1.2}
.tcard .t-streak{font-size:11px;font-weight:700;color:var(--ca);margin-top:2px}

.add-btn{width:100%;padding:15px;border:1.5px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--muted);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.add-btn:hover{border-color:var(--muted);color:var(--text)}

.topbar{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.back{width:40px;height:40px;border-radius:11px;border:1px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand .ic{width:42px;height:42px;border-radius:12px;background:var(--ac-l);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.brand .b-name{font-weight:700;font-size:18px;letter-spacing:-.01em;line-height:1.1}
.brand .b-sub{font-size:12px;color:var(--muted)}

.tabs{display:flex;gap:8px;margin-bottom:18px}
.tab{flex:1;padding:10px;border-radius:11px;border:1.5px solid var(--border);background:var(--surf);cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);transition:all .15s}
.tab.active{background:var(--ac);border-color:var(--ac);color:#fff}

.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.date-arrow{width:46px;height:46px;border-radius:12px;border:1.5px solid var(--border);background:var(--surf);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0}
.date-arrow:active{transform:scale(.94)}
.date-arrow:disabled{opacity:.3;cursor:not-allowed}
.date-center{flex:1;text-align:center;cursor:pointer;border-radius:12px;padding:4px;transition:background .12s}
.date-center:active{background:var(--surf2)}
.date-dow{font-size:13px;color:var(--muted);font-weight:600}
.date-main{font-size:20px;font-weight:700;letter-spacing:-.01em}
.date-tap-hint{font-size:10px;color:var(--muted);opacity:.7}
.today-pill{display:inline-block;font-size:10px;font-weight:700;background:var(--ac-l);color:var(--ac);padding:1px 7px;border-radius:20px;margin-left:6px;vertical-align:middle;text-transform:uppercase;letter-spacing:.05em}

.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.card-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

.suggest{background:var(--ac-l);border:1px solid var(--ac);border-radius:13px;padding:13px 15px;margin-bottom:14px}
.suggest .s-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.suggest .s-focus{font-weight:700;font-size:14px;color:var(--ac)}
.suggest .s-view{font-size:12px;font-weight:600;color:var(--ac);cursor:pointer;text-decoration:underline;white-space:nowrap}
.suggest .s-detail{font-size:13px;color:var(--text);margin-top:3px}

.toggle{display:flex;align-items:center;gap:14px;padding:16px;border-radius:13px;border:1.5px solid var(--border);background:var(--surf2);cursor:pointer;transition:all .14s;user-select:none;-webkit-tap-highlight-color:transparent;margin-bottom:10px}
.toggle:last-child{margin-bottom:0}
.toggle:active{transform:scale(.985)}
.toggle.on{background:var(--green-l);border-color:var(--green-b)}
.toggle.on.gold{background:var(--gold-l);border-color:var(--gold-b)}
.toggle .box{width:30px;height:30px;border-radius:9px;border:2px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:all .14s}
.toggle.on .box{background:var(--green);border-color:var(--green);color:#fff}
.toggle.on.gold .box{background:var(--gold);border-color:var(--gold);color:#fff}
.toggle .t-label{font-weight:700;font-size:15px}
.toggle .t-hint{font-size:12px;color:var(--muted);margin-top:1px}
.toggle.on .t-hint{color:var(--green)}
.toggle.on.gold .t-hint{color:var(--gold)}
.toggle-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toggle2{display:flex;flex-direction:column;align-items:center;gap:9px;padding:18px 10px;border-radius:13px;border:1.5px solid var(--border);background:var(--surf2);cursor:pointer;transition:all .14s;-webkit-tap-highlight-color:transparent;text-align:center}
.toggle2:active{transform:scale(.97)}
.toggle2 .box{width:34px;height:34px;border-radius:10px;border:2px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .14s}
.toggle2 .t-label{font-weight:700;font-size:14px}
.toggle2.on{background:var(--green-l);border-color:var(--green-b)}
.toggle2.on .box{background:var(--green);border-color:var(--green);color:#fff}
.toggle2.on.gold{background:var(--gold-l);border-color:var(--gold-b)}
.toggle2.on.gold .box{background:var(--gold);border-color:var(--gold);color:#fff}
.sessions.sessions-3{grid-template-columns:repeat(3,1fr)}

.sessions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sbtn{padding:16px 6px;border-radius:13px;border:1.5px solid var(--border);background:var(--surf2);cursor:pointer;text-align:center;transition:all .14s;-webkit-tap-highlight-color:transparent}
.sbtn:active{transform:scale(.95)}
.sbtn .s-num{font-size:24px;font-weight:700;line-height:1}
.sbtn .s-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600}
.sbtn.sel[data-n="1"]{background:var(--green-l);border-color:var(--green-b)}
.sbtn.sel[data-n="1"] .s-num{color:var(--green)}
.sbtn.sel[data-n="2"]{background:var(--gold-l);border-color:var(--gold-b)}
.sbtn.sel[data-n="2"] .s-num{color:var(--gold)}
.sbtn.sel[data-n="3"]{background:linear-gradient(135deg,#fff0f5,#fffbe6,#f0fff4);border-color:#d4a017;box-shadow:0 0 0 2px #f5d76e66}
.sbtn.sel[data-n="3"] .s-num{background:linear-gradient(90deg,#c2410c,#b8860b,#7c3aed);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sbtn.sel[data-n="0"]{background:var(--surf2);border-color:var(--muted)}

.note-area{width:100%;min-height:84px;padding:13px;border-radius:12px;border:1.5px solid var(--border);font-size:15px;font-family:inherit;resize:vertical;outline:none;color:var(--text);background:var(--surf);line-height:1.5}
.note-area:focus{border-color:var(--ac)}
.note-area.required-miss{border-color:var(--danger);background:var(--danger-l)}
.note-help{font-size:12px;color:var(--muted);margin-top:6px}
.note-help.miss{color:var(--danger);font-weight:600}

.save-bar{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(to top,var(--bg) 62%,transparent);padding:14px 16px calc(16px + env(safe-area-inset-bottom));z-index:30}
.save-inner{max-width:600px;margin:0 auto}
.save-btn{width:100%;padding:17px;border-radius:14px;border:none;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:background .14s,transform .14s;background:var(--ac);color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.12);letter-spacing:.01em}
.save-btn:active{transform:scale(.98)}
.save-btn.dirty{animation:pulse 1.6s ease-in-out infinite}
.save-btn.saved{background:var(--green);box-shadow:none}
.save-btn:disabled{background:var(--surf2);color:var(--muted);box-shadow:none;cursor:not-allowed}
@keyframes pulse{0%,100%{box-shadow:0 4px 16px rgba(0,0,0,.12)}50%{box-shadow:0 4px 22px var(--ac)}}

.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--surf);border:1px solid var(--border);border-radius:13px;padding:14px 10px;text-align:center;box-shadow:var(--shadow)}
.stat strong{display:block;font-size:24px;font-weight:700;color:var(--ac);line-height:1}
.stat span{font-size:11px;color:var(--muted);margin-top:4px;display:block}

.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted);margin-bottom:16px;align-items:center}
.legend .lg{display:inline-flex;align-items:center;gap:5px}
.lg .sw{width:14px;height:14px;border-radius:4px;display:inline-block;border:1.5px solid var(--border)}
.sw.green{background:var(--green-l);border-color:var(--green-b)}
.sw.gold{background:var(--gold-l);border-color:var(--gold-b)}
.sw.tri{background:linear-gradient(135deg,#fff0f5,#fffbe6,#f0fff4);border-color:#d4a017}
.legend .sw.lg1{background:var(--l1bg);border-color:var(--l1bd)}
.legend .sw.lg2{background:var(--l2bg);border-color:var(--l2bd)}

.month{margin-bottom:22px}
.month-name{font-weight:700;font-size:15px;margin-bottom:8px;display:flex;align-items:baseline;gap:8px}
.month-name .m-count{font-size:12px;color:var(--muted);font-weight:500}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal .dow-h{font-size:10px;color:var(--muted);text-align:center;font-weight:600;padding-bottom:2px}
.cell{aspect-ratio:1;border-radius:8px;border:1.5px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;position:relative;transition:transform .1s}
.cell:active{transform:scale(.9)}
.cell.empty{visibility:hidden;cursor:default}
.cell.future{opacity:.4;cursor:default}
.cell.today{outline:2px solid var(--ac);outline-offset:1px}
.cell.lv1{background:var(--l1bg);border-color:var(--l1bd)}
.cell.lv2{background:var(--l2bg);border-color:var(--l2bd)}
.cell-num{font-size:12px;font-weight:700}
.cell-num.corner{position:absolute;top:2px;left:5px;font-size:10px;opacity:.9}
.cell-ic{font-size:20px;line-height:1}
.cell.lv1 .cell-num{color:var(--l1fg)}
.cell.lv2 .cell-num{color:var(--l2fg)}
@keyframes shimmer{0%,100%{box-shadow:0 0 0 2px #f5d76e55}50%{box-shadow:0 0 8px 2px #f5d76eaa}}
.cell .mark{position:absolute;font-size:11px;top:1px;right:2px;line-height:1}
.cell.has-note::after{content:'';position:absolute;bottom:3px;right:3px;width:4px;height:4px;border-radius:50%;background:var(--muted);opacity:.5}
.cell.lv1.has-note::after{background:var(--l1fg)}
.cell.lv2.has-note::after{background:var(--l2fg);opacity:.7}

/* Plan tab */
.plan-day{border:1px solid var(--border);border-radius:13px;margin-bottom:10px;overflow:hidden;background:var(--surf)}
.plan-day-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.plan-day-head .pd-dow{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--muted);width:34px;flex-shrink:0}
.plan-day-head .pd-title{font-weight:700;font-size:15px;flex:1}
.plan-day-head .pd-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:20px;background:var(--ac-l);color:var(--ac)}
.plan-day-head .pd-tag.run{background:#e0ecff;color:#1d4ed8}
.plan-day-head .pd-tag.mob{background:#eafbf0;color:#15803d}
.plan-day-head .pd-tag.chest{background:#ffe9e0;color:#c2410c}
.plan-day-head .pd-tag.rest{background:var(--surf2);color:var(--muted)}
.plan-day-head .chev{color:var(--muted);transition:transform .2s}
.plan-day.open .chev{transform:rotate(90deg)}
.plan-day-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border)}
.plan-day.open .plan-day-body{display:block}
.plan-ex{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px dashed var(--border);font-size:14px}
.plan-ex:last-child{border-bottom:none}
.plan-ex .pe-name{font-weight:600}
.plan-ex .pe-note{font-size:12px;color:var(--muted);margin-top:1px}
.plan-ex .pe-sets{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--ac);white-space:nowrap;flex-shrink:0;text-align:right}
.plan-intro{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.macro-target{background:var(--ac);color:#fff;border-radius:14px;padding:16px 18px;margin-bottom:14px}
.macro-target .mt-big{font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1}
.macro-target .mt-lbl{font-size:13px;opacity:.85;margin-top:2px}
.food-row{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px dashed var(--border);font-size:14px}
.food-row:last-child{border-bottom:none}
.food-row .fr-p{font-family:'DM Mono',monospace;font-weight:600;color:var(--ac);white-space:nowrap}
.sample-meal{padding:10px 0;border-bottom:1px dashed var(--border)}
.sample-meal:last-child{border-bottom:none}
.sample-meal .sm-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.sample-meal .sm-name{font-weight:600;font-size:14px}
.sample-meal .sm-p{font-size:12px;color:var(--ac);font-weight:600}
.tips li{margin:6px 0;font-size:14px}

/* Combined view */
.combo-toggle{display:flex;gap:6px;margin-bottom:18px;background:var(--surf2);padding:5px;border-radius:13px}
.combo-toggle button{flex:1;padding:9px;border-radius:9px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);transition:all .14s}
.combo-toggle button.active{background:var(--surf);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.rows-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
.rows-grid{display:grid;gap:4px;min-width:max-content}
.rows-head .rc{font-size:9px;color:var(--muted);text-align:center;font-weight:600}
.rc{width:17px;height:17px;display:flex;align-items:center;justify-content:center}
.row-label{font-size:14px;width:34px;display:flex;align-items:center;justify-content:center;position:sticky;left:0;background:var(--bg);z-index:2}
.rcell{width:17px;height:17px;border-radius:4px;border:1px solid var(--border);background:var(--surf);cursor:pointer}
.rcell.lv1{background:var(--green-l);border-color:var(--green-b)}
.rcell.lv2{background:var(--gold-l);border-color:var(--gold-b)}
.rcell.lv3{background:linear-gradient(135deg,#fff0f5,#fffbe6,#f0fff4);border-color:#d4a017}
.rcell.empty{visibility:hidden}
.cols-wrap{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(150px,1fr);gap:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
.col-head{display:flex;align-items:center;gap:6px;font-weight:700;font-size:14px;margin-bottom:8px}
.mini-month{margin-bottom:14px}
.mini-month .mm-name{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
.mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mini-cell{aspect-ratio:1;border-radius:5px;border:1px solid var(--border);background:var(--surf);font-size:9px;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer}
.mini-cell.empty{visibility:hidden}
.mini-cell.lv1{background:var(--l1bg);border-color:var(--l1bd);color:var(--l1fg)}
.mini-cell.lv2{background:var(--l2bg);border-color:var(--l2bd);color:var(--l2fg)}
.merged-cell{aspect-ratio:1;border-radius:8px;border:1.5px solid var(--border);overflow:hidden;display:flex;flex-direction:column;cursor:pointer;position:relative}
.merged-cell .mc-num{position:absolute;top:1px;left:3px;font-size:9px;color:var(--muted);font-weight:600;z-index:1}
.merged-cell .seg{flex:1}
.seg.lv0{background:var(--surf)}
.seg.lv1{background:var(--green-l)}
.seg.lv2{background:var(--gold-l)}
.seg.lv3{background:linear-gradient(135deg,#fff0f5,#fffbe6,#f0fff4)}
.merged-cell.empty{visibility:hidden}
.merged-legend{font-size:11px;color:var(--muted);margin-bottom:14px;display:flex;flex-wrap:wrap;gap:10px}
.merged-legend .ml{display:inline-flex;align-items:center;gap:4px}

/* Admin */
.admin-row{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.admin-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.admin-emoji{width:48px;height:48px;border-radius:12px;background:var(--surf2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;flex-shrink:0}
.admin-emoji:active{transform:scale(.94)}
.admin-fields{flex:1;display:grid;gap:8px}
.admin-fields input{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;outline:none;color:var(--text);background:var(--surf)}
.admin-fields input:focus{border-color:var(--ac)}
.admin-fields input.name{font-weight:700;font-size:15px}
.admin-actions{display:flex;gap:8px;align-items:center}
.admin-labels{display:grid;gap:7px;margin-bottom:10px;padding-top:10px;border-top:1px dashed var(--border)}
.admin-labels .al{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.admin-labels .al span{flex:0 0 132px}
.admin-labels .al input{flex:1;min-width:0;padding:8px 10px;border-radius:9px;border:1.5px solid var(--border);font-size:13px;font-family:inherit;outline:none;color:var(--text);background:var(--surf)}
.admin-labels .al input:focus{border-color:var(--ac)}
.admin-labels .lvl-pick{display:inline-flex;gap:6px}
.admin-labels .lvl-btn{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--surf);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted)}
.admin-labels .lvl-btn.on{background:var(--ac);border-color:var(--ac);color:#fff}
.admin-actions .a-mode{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em}
.admin-del{margin-left:auto;font-size:12px;color:var(--danger);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600}

.saved-tag{font-size:11px;color:var(--green);font-weight:600;opacity:0;transition:opacity .2s}

/* Sheets */
.sheet-bg{position:fixed;inset:0;background:rgba(28,26,22,.45);display:none;align-items:flex-end;justify-content:center;z-index:60}
.sheet-bg.show{display:flex}
.sheet{background:var(--surf);width:100%;max-width:600px;border-radius:20px 20px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));animation:slideUp .25s ease;max-height:88vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet h2,.sheet h3{font-size:18px;font-weight:700;margin-bottom:2px}
.sheet .s-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.d-status{font-size:13px;font-weight:600;margin-bottom:12px}
.d-note{background:var(--surf2);border-radius:12px;padding:14px;font-size:14px;line-height:1.55;min-height:50px;white-space:pre-wrap;color:var(--text)}
.d-note.empty{color:var(--muted);font-style:italic}
.combo-day-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.combo-day-row:last-child{border-bottom:none}
.cdr-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cdr-body{flex:1;min-width:0}
.cdr-name{font-weight:700;font-size:14px}
.cdr-status{font-size:12px;font-weight:600;margin:1px 0 3px}
.cdr-note{font-size:13px;color:var(--muted);line-height:1.45}
.cdr-note.empty{font-style:italic;opacity:.7}
.sheet-actions{display:flex;gap:10px;margin-top:16px}
.sheet-actions .btn{flex:1;padding:14px;border-radius:12px;border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.btn.ghost{background:var(--surf2);color:var(--text)}
.btn.primary{background:var(--ac);color:#fff}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.field input[type=text]{width:100%;padding:12px 13px;border-radius:11px;border:1.5px solid var(--border);font-size:15px;font-family:inherit;outline:none;color:var(--text);background:var(--surf)}
.field input:focus{border-color:var(--text)}
.chip-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:10px 14px;border-radius:11px;border:1.5px solid var(--border);background:var(--surf);cursor:pointer;font-size:15px;font-weight:600;transition:all .12s}
.chip.sel{border-color:var(--text);background:var(--surf2)}
.emoji-chip{font-size:22px;padding:8px 12px}
.color-chip{width:38px;height:38px;border-radius:11px;border:2px solid transparent;cursor:pointer}
.color-chip.sel{border-color:var(--text)}
.mode-hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.4}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.emoji-grid .emoji-chip{display:flex;align-items:center;justify-content:center}

/* Month picker */
.mp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mp-arrow{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--border);background:var(--surf);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mp-arrow:disabled{opacity:.3}
.mp-title{font-weight:700;font-size:16px}
.mp-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.mp-dow{font-size:10px;color:var(--muted);text-align:center;font-weight:600}
.mp-cell{aspect-ratio:1;border-radius:9px;border:1.5px solid var(--border);background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer}
.mp-cell.empty{visibility:hidden}
.mp-cell.sel{background:var(--ac);border-color:var(--ac);color:#fff}
.mp-cell.today{outline:2px solid var(--ac);outline-offset:1px}
.mp-cell.oor{opacity:.3;pointer-events:none}

.tl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.tl-inner{width:max-content}
.tl-months{display:flex;padding-left:30px;margin-bottom:6px}
.tl-mlabel{font-size:10px;color:var(--muted);font-weight:600;flex:0 0 auto;border-left:1px solid var(--border);padding-left:4px;height:14px}
.tl-row{display:flex;align-items:center;margin-bottom:4px}
.tl-label{position:sticky;left:0;width:30px;flex:0 0 30px;background:var(--bg);z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.1}
.tl-label .tl-emoji{font-size:15px}
.tl-label .tl-count{font-size:8px;color:var(--muted);font-weight:700;margin-top:1px}
.ch-count{font-size:11px;color:var(--muted);font-weight:500;margin-left:auto}
.tl-track{font-size:0;white-space:nowrap}
.tl-sq{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;margin-right:2px;border-radius:4px;border:1.5px solid var(--border);background:var(--surf);vertical-align:top;font-size:8px;font-weight:700;position:relative}
.tl-sq.lv1{background:var(--l1bg);border-color:var(--l1bd);color:var(--l1fg)}
.tl-sq.lv1::after{content:'\2713'}
.tl-sq.lv2{background:var(--l2bg);border-color:var(--l2bd);color:var(--l2fg)}
.tl-sq.lv2::after{content:'\2605'}
.tl-sq.fut{opacity:.22}
.tl-sq.today{outline:2px solid var(--ac);outline-offset:1px}
.tl-sq.click{cursor:pointer}
.mini-cell.fut{opacity:.22;cursor:default}
.cell.lv3{background:var(--l3bg);border-color:var(--l3bd);box-shadow:0 0 0 3px var(--l3ring)}

.cell.lv3.has-note::after{background:#fff;opacity:.7}
.legend .sw.lg3{background:var(--l3bg);border-color:var(--l3bd);box-shadow:0 0 0 2px var(--l3ring)}
.mini-cell.lv3{background:var(--l3bg);border-color:var(--l3bd);box-shadow:0 0 0 2px var(--l3ring);color:var(--l3fg)}
.tl-sq.lv3{background:var(--l3bg);border-color:var(--l3bd);box-shadow:0 0 0 2px var(--l3ring);color:#fff}
.tl-sq.lv3::after{content:'\2605'}
.err{text-align:center;padding:70px 20px;color:var(--muted)}
.err .big{font-size:46px;margin-bottom:12px}

<body>
<div class="wrap"><div id="app"></div></div>

<div class="save-bar" id="save-bar" style="display:none">
  <div class="save-inner"><button class="save-btn" id="save-btn" onclick="onSaveClick()">Save day</button></div>
</div>

<!-- Day detail (single tracker) -->
<div class="sheet-bg" id="detail" onclick="if(event.target.id==='detail')closeSheet('detail')">
  <div class="sheet">
    <h3 id="d-date">—</h3>
    <div class="d-status" id="d-status"></div>
    <div class="d-note" id="d-note"></div>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="closeSheet('detail')">Close</button>
      <button class="btn primary" onclick="editFromDetail()">Edit this day</button>
    </div>
  </div>
</div>

<!-- Combined day detail (all trackers) -->
<div class="sheet-bg" id="combo-detail" onclick="if(event.target.id==='combo-detail')closeSheet('combo-detail')">
  <div class="sheet">
    <h3 id="cd-date">—</h3>
    <div class="s-sub">Notes across your trackers</div>
    <div id="cd-body"></div>
    <div class="sheet-actions"><button class="btn ghost" onclick="closeSheet('combo-detail')">Close</button></div>
  </div>
</div>

<!-- Emoji editor -->
<div class="sheet-bg" id="emoji-sheet" onclick="if(event.target.id==='emoji-sheet')closeSheet('emoji-sheet')">
  <div class="sheet">
    <h3>Choose an icon</h3>
    <div class="s-sub" id="emoji-for"></div>
    <div class="emoji-grid" id="emoji-grid"></div>
    <div class="sheet-actions"><button class="btn ghost" onclick="closeSheet('emoji-sheet')">Cancel</button></div>
  </div>
</div>

<!-- Add tracker -->
<div class="sheet-bg" id="add-sheet" onclick="if(event.target.id==='add-sheet')closeSheet('add-sheet')">
  <div class="sheet">
    <h2>New tracker</h2>
    <div class="s-sub">Add a habit to track — like Spanish or meditation.</div>
    <div class="field"><label>Name</label><input type="text" id="m-name" placeholder="e.g. Spanish Training" maxlength="28"/></div>
    <div class="field"><label>Subtitle</label><input type="text" id="m-sub-input" placeholder="e.g. Language practice" maxlength="32"/></div>
    <div class="field"><label>Icon</label><div class="emoji-grid" id="m-emoji-row"></div></div>
    <div class="field"><label>Whose tracker?</label><div class="chip-row" id="m-owner-row"></div></div>
    <div class="field"><label>Type</label><div class="chip-row" id="m-mode-row"></div><div class="mode-hint" id="m-mode-hint"></div></div>
    <div id="m-check-fields">
      <div class="field"><label>Level 1 label</label><input type="text" id="m-act1" placeholder="e.g. Workout done" maxlength="24"/></div>
      <div class="field"><label>Level 2 label (optional)</label><input type="text" id="m-act2" placeholder="e.g. Protein hit" maxlength="24"/></div>
      <div class="field"><label>Level 3 label (optional)</label><input type="text" id="m-act3" placeholder="e.g. 10k steps" maxlength="24"/></div>
    </div>
    <div id="m-dog-fields" style="display:none">
      <div class="field"><label>Unit name</label><input type="text" id="m-unit" placeholder="session" maxlength="24"/></div>
      <div class="field"><label>Levels</label><div class="chip-row" id="m-lvls-row"></div></div>
    </div>
    <div class="field"><label>Note prompt</label><input type="text" id="m-noteph" placeholder="e.g. What did you do today?" maxlength="70"/></div>
    <div class="field"><label>Color</label><div class="chip-row" id="m-color-row"></div></div>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="closeSheet('add-sheet')">Cancel</button>
      <button class="btn primary" onclick="createTracker()">Create tracker</button>
    </div>
  </div>
</div>

<!-- Month picker -->
<div class="sheet-bg" id="month-sheet" onclick="if(event.target.id==='month-sheet')closeSheet('month-sheet')">
  <div class="sheet">
    <div class="mp-head">
      <button class="mp-arrow" id="mp-prev" onclick="mpShift(-1)">‹</button>
      <div class="mp-title" id="mp-title">—</div>
      <button class="mp-arrow" id="mp-next" onclick="mpShift(1)">›</button>
    </div>
    <div class="mp-cal" id="mp-cal"></div>
    <div class="sheet-actions"><button class="btn ghost" onclick="closeSheet('month-sheet')">Close</button><button class="btn primary" onclick="mpJumpToday()">Jump to today</button></div>
  </div>
</div>

<script>
/* ===================== DATA LAYER ===================== */
const START=new Date(2026,5,1);          // Jun 1 2026
const END=new Date(2027,5,1);            // Jun 1 2027
const CUSTOM_KEY='habit_trackers_custom';
const OVR_KEY='habit_tracker_overrides'; // {id:{name,subtitle,emoji}}
const LAYOUT_KEY='habit_combined_layout';
const HOME_TITLE_KEY='habit_home_title';
function homeTitle(){return jget(HOME_TITLE_KEY,'Family Training');}

const BUILTIN=[
  {id:'jj',     name:'JJ Training',     subtitle:'Health & Fitness', emoji:'🔥', mode:'fitness', accent:'#0d6e6b', owner:'me'},
  {id:'odie',   name:'Odie Training',   subtitle:'Dog Training',     emoji:'🐕', mode:'dog',     accent:'#c2410c', owner:'me'},
  {id:'nithya', name:'Nithya Training', subtitle:'Health & Fitness', emoji:'💪', mode:'fitness', accent:'#7c3aed', owner:'nithya'},
];

function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseYmd(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function jget(k,f){try{const d=localStorage.getItem(k);return d?JSON.parse(d):f;}catch(e){return f;}}
function jset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function loadCustom(){return jget(CUSTOM_KEY,[]);}
function loadOvr(){return jget(OVR_KEY,{});}
function defActs(base){
  const m=base.mode;const bf=(base.id==='jj'||base.id==='nithya');
  return {
    act1: m==='dog'?'session':(bf?'Workout done':'Done'),
    act2: m==='dog'?'':(bf?'Protein hit':''),
    act3: '',
    notePh: m==='dog'?'e.g. Recall in the yard, place command, loose-leash walking…':(bf?'e.g. Heavy bench 4×6, rows, pull-ups, 5 min rope finisher…':'e.g. What did you do today? How did it go?'),
    lvls: 2
  };
}
function baseActs(base){const d=defActs(base);return {
  act1:base.act1||d.act1,
  act2:(base.act2!==undefined?base.act2:d.act2),
  act3:(base.act3!==undefined?base.act3:d.act3),
  notePh:base.notePh||d.notePh,
  lvls:(base.lvls!==undefined?base.lvls:d.lvls)
};}
function allTrackers(){
  const ov=loadOvr();
  return [...BUILTIN,...loadCustom()].map(t=>{
    const o=ov[t.id]||{};const b=baseActs(t);
    return {...t,name:o.name||t.name,subtitle:o.subtitle||t.subtitle,emoji:o.emoji||t.emoji,owner:t.owner||'me',
      act1:o.act1||b.act1,
      act2:(o.act2!==undefined?o.act2:b.act2),
      act3:(o.act3!==undefined?o.act3:b.act3),
      notePh:o.notePh||b.notePh,
      lvls:(o.lvls!==undefined?o.lvls:b.lvls)};
  });
}
function actsList(t){const out=[];if(t.act1)out.push({label:t.act1,key:'done'});if(t.act1&&t.act2)out.push({label:t.act2,key:'bonus'});if(t.act1&&t.act2&&t.act3)out.push({label:t.act3,key:'extra'});return out;}
function maxLevel(t){if(t.mode==='dog')return t.lvls===3?3:2;return Math.max(1,actsList(t).length);}
function getTracker(id){return allTrackers().find(t=>t.id===id);}
function isCustom(id){return loadCustom().some(c=>c.id===id);}
function loadData(id){return jget('habit_data_'+id,{});}
function writeData(id,obj){jset('habit_data_'+id,obj);}
function levelOf(t,e){
  if(!e)return 0;
  if(t.mode==='dog')return Math.min(maxLevel(t),e.sessions||0);
  const c=(e.done?1:0)+(e.bonus?1:0)+(e.extra?1:0);
  return Math.min(maxLevel(t),c);
}
function softColor(hex){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},.13)`;}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function clampDate(d){const x=new Date(d);x.setHours(0,0,0,0);if(x<START)return new Date(START);if(x>=END)return new Date(END);return x;}
function currentStreak(t){const data=loadData(t.id);const today=new Date();today.setHours(0,0,0,0);let s=0,c=new Date(today);if(levelOf(t,data[ymd(c)])===0)c.setDate(c.getDate()-1);while(c>=START){if(levelOf(t,data[ymd(c)])>=1){s++;c.setDate(c.getDate()-1);}else break;}return s;}
function lastActive(t){const data=loadData(t.id);let c=new Date();c.setHours(0,0,0,0);while(c>=START){if(levelOf(t,data[ymd(c)])>=1)return new Date(c);c.setDate(c.getDate()-1);}return null;}
function daysHit(t){const data=loadData(t.id);let n=0;Object.keys(data).forEach(k=>{if(levelOf(t,data[k])>=1)n++;});return n;}
// center icon per tracker for Overview cells
function trackerIcon(t,lv){if(lv>=3)return '🌟';if(lv===2)return t.id==='jj'?'💪':'⭐';if(lv===1)return '✅';return '';}
function statusText(t,e){
  if(!e)return t.mode==='dog'?'No sessions':'Nothing logged';
  if(t.mode==='dog'){const s=e.sessions||0;if(s<1)return 'No sessions';const u=t.act1||'session';return `${trackerIcon(t,levelOf(t,e))} ${s} ${u}${s>1?'s':''}`;}
  const hit=actsList(t).filter(l=>e[l.key]);
  if(!hit.length)return 'Nothing logged';
  return `${trackerIcon(t,levelOf(t,e))} ${hit.map(l=>l.label).join(' + ')}`;
}

function route(){

  if(h.startsWith('t/'))return {view:'tracker',id:h.slice(2)};
  if(h==='admin')return {view:'admin'};
  if(h==='combined')return {view:'combined'};
  return {view:'home'};
}

function enterRoute(){
  const r=route();
  document.getElementById('save-bar').style.display='none';
  if(r.view==='tracker'){
    TRACKER=getTracker(r.id);

    document.documentElement.style.setProperty('--ac',TRACKER.accent);

}

function shiftDay(delta){if(dirty&&!confirm('Unsaved changes on this day. Leave without saving?'))return;const d=new Date(selDate);d.setDate(d.getDate()+delta);selDate=clampDate(d);_loadedFor=null;renderLog();}
function toggleAct(k){edit[k]=!edit[k];dirty=true;justSaved=false;renderLog();}
function setSessions(n){edit.sessions=n;dirty=true;justSaved=false;renderLog();}
function onNoteInput(){edit.note=document.getElementById('note').value;dirty=true;justSaved=false;updateSaveBtn();document.getElementById('note').classList.remove('required-miss');document.getElementById('note-help').classList.remove('miss');}
function validation(){const hasActivity=TRACKER.mode==='dog'?edit.sessions>0:(edit.done||edit.bonus||edit.extra);return hasActivity?{ok:true}:{ok:false,reason:'empty'};}
function updateSaveBtn(){const btn=document.getElementById('save-btn');if(!btn)return;const v=validation();btn.classList.remove('saved','dirty');if(justSaved){btn.textContent='Saved ✓';btn.classList.add('saved');btn.disabled=false;return;}if(!v.ok){btn.disabled=true;btn.textContent='Mark a session to save';}else{btn.disabled=false;btn.textContent=dirty?'Save day':'Saved — edit & save again';if(dirty)btn.classList.add('dirty');}}
function saveDay(){const v=validation();if(!v.ok)return;const data=loadData(TRACKER.id);data[ymd(selDate)]=TRACKER.mode==='dog'?{sessions:edit.sessions,note:edit.note.trim(),ts:new Date().toISOString()}:{done:edit.done,bonus:!!edit.bonus,extra:!!edit.extra,note:edit.note.trim(),ts:new Date().toISOString()};writeData(TRACKER.id,data);dirty=false;justSaved=true;updateSaveBtn();if(navigator.vibrate)navigator.vibrate([25,18,25]);}

function overviewLegend(t){

  }

  if(labels.length<=1)return `<span class="lg"><span class="sw lg1"></span>✅ ${escapeHtml(labels.length?labels[0].label:(t.act1||'Done'))}</span>`;
  if(labels.length===2)return `<span class="lg"><span class="sw lg1"></span>✅ ${escapeHtml(labels[0].label)} or ${escapeHtml(labels[1].label)}</span><span class="lg"><span class="sw lg2"></span>${trackerIcon(t,2)} Both done</span>`;

function renderOverview(){
  const data=loadData(TRACKER.id);const stats=computeStats(data);
  let html=`<div class="stats">
      <div class="stat"><strong>${stats.current}</strong><span>current streak</span></div>
      <div class="stat"><strong>${stats.active}</strong><span>days hit</span></div>
    </div><div class="legend">${overviewLegend(TRACKER)}</div>`;
  let y=START.getFullYear(),m=START.getMonth();const lastY=END.getFullYear(),lastM=END.getMonth();
  const today=new Date();today.setHours(0,0,0,0);
  while(y<lastY||(y===lastY&&m<=lastM)){html+=renderMonth(y,m,data,today);m++;if(m>11){m=0;y++;}}
  document.getElementById('tab-body').innerHTML=html;
}
function renderMonth(y,m,data,today){
  const first=new Date(y,m,1);const monthName=first.toLocaleDateString([],{month:'long',year:'numeric'});
  const dim=new Date(y,m+1,0).getDate();const startDow=first.getDay();let active=0,cells='';
  for(let i=0;i<startDow;i++)cells+=`<div class="cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const date=new Date(y,m,d);date.setHours(0,0,0,0);
    if(date<START||date>END){cells+=`<div class="cell empty"></div>`;continue;}
    const key=ymd(date);const e=data[key];const lv=levelOf(TRACKER,e);if(lv>=1)active++;
    const isFuture=date>today;const isToday=key===ymd(today);
    const title=e&&e.note?` title="${escapeHtml(e.note).slice(0,90)}"`:'';
    const cls=['cell',lv?'lv'+lv:'',isFuture?'future':'',isToday?'today':'',e&&e.note?'has-note':''].filter(Boolean).join(' ');
    const click=isFuture?'':`onclick="openDetail('${key}')"`;
    const ic=lv>=1?trackerIcon(TRACKER,lv):'';
    const numCls=lv>=1?'cell-num corner':'cell-num';
    cells+=`<div class="${cls}" ${click}${title}><span class="${numCls}">${d}</span>${ic?`<span class="cell-ic">${ic}</span>`:''}</div>`;
  }
  const dows=['S','M','T','W','T','F','S'].map(x=>`<div class="dow-h">${x}</div>`).join('');
  return `<div class="month"><div class="month-name">${monthName}<span class="m-count">${active} hit</span></div><div class="cal">${dows}${cells}</div></div>`;
}
function computeStats(data){
  const today=new Date();today.setHours(0,0,0,0);let active=0;
  Object.keys(data).forEach(k=>{if(levelOf(TRACKER,data[k])>=1)active++;});
  let current=0,c=new Date(today);if(levelOf(TRACKER,data[ymd(c)])===0)c.setDate(c.getDate()-1);
  while(c>=START){if(levelOf(TRACKER,data[ymd(c)])>=1){current++;c.setDate(c.getDate()-1);}else break;}
  return {current,active};
}

        const key=ymd(date);const e=data[key];const lv=levelOf(t,e);
        const title=e&&e.note?`${escapeHtml(e.note).slice(0,80)}`:date.toLocaleDateString();
        cells+=`<div class="mini-cell ${lvClass(lv)}" title="${title}" onclick="openComboDay('${key}')">${d}</div>`;
      }
      return `<div class="mini-month"><div class="mm-name">${mname}</div><div class="mini-cal">${cells}</div></div>`;
    }).join('');
    const dh=daysHit(t);
    return `<div><div class="col-head">${t.emoji} ${escapeHtml(t.name)}<span class="ch-count">${dh} days</span></div>${mini}</div>`;
  }).join('');
  document.getElementById('combo-body').innerHTML=`<div class="cols-wrap">${cols}</div>`;
}

function openComboDay(key){
  const date=parseYmd(key);
  document.getElementById('cd-date').textContent=date.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const body=meTrackers().map(t=>{
    const e=loadData(t.id)[key];const lv=levelOf(t,e);
    let status=statusText(t,e);
    const color=lv===2?'var(--gold)':lv===1?'var(--green)':'var(--muted)';
    const note=e&&e.note?`<div class="cdr-note">${escapeHtml(e.note)}</div>`:`<div class="cdr-note empty">No note.</div>`;
    return `<div class="combo-day-row"><div class="cdr-ic" style="background:${softColor(t.accent)}">${t.emoji}</div>
      <div class="cdr-body"><div class="cdr-name">${escapeHtml(t.name)}</div><div class="cdr-status" style="color:${color}">${status}</div>${note}</div></div>`;
  }).join('');
  document.getElementById('cd-body').innerHTML=body;
  openSheet('combo-detail');
}

/* ===================== ADMIN ===================== */
let adminDraft={},adminDirty=false,adminHomeTitleDraft='';
function baseOf(id){const b=BUILTIN.find(t=>t.id===id);if(b)return b;return loadCustom().find(t=>t.id===id);}
function renderAdmin(){
  adminDraft={};adminDirty=false;adminHomeTitleDraft=homeTitle();
  allTrackers().forEach(t=>{adminDraft[t.id]={name:t.name,subtitle:t.subtitle,emoji:t.emoji,act1:t.act1,act2:t.act2,act3:t.act3,notePh:t.notePh,lvls:t.lvls};});
  document.getElementById('app').innerHTML=`
    <div class="topbar"><div class="back" onclick="leaveAdmin()">←</div>
      <div class="brand"><div class="ic">⚙️</div><div><div class="b-name">Manage trackers</div><div class="b-sub">Edit home title, names, icons & subtitles</div></div></div></div>
    <div class="admin-row">
      <div class="card-label" style="margin-bottom:8px">Home page title</div>
      <div class="admin-fields"><input class="name" type="text" id="admin-home-title" value="${escapeHtml(homeTitle())}" oninput="adminSetHome(this.value)" placeholder="Family Training"/></div>
    </div>
    <div class="section-label" style="margin:18px 0 12px">Trackers</div>
    <div id="admin-list"></div>
    <button class="add-btn" onclick="openAdd()">+ Add a tracker</button>`;
  renderAdminList();
  const bar=document.getElementById('save-bar');bar.style.display='block';
  const btn=document.getElementById('save-btn');btn.textContent='Save changes';btn.classList.remove('saved','dirty');btn.disabled=false;
}
function renderAdminList(){
  document.getElementById('admin-list').innerHTML=allTrackers().map(t=>{
    const custom=isCustom(t.id);const hasOvr=!!(loadOvr()[t.id]);const d=adminDraft[t.id]||{name:t.name,subtitle:t.subtitle,emoji:t.emoji,act1:t.act1,act2:t.act2,act3:t.act3,notePh:t.notePh,lvls:t.lvls};
    const ownerTag=t.owner==='nithya'?'Nithya':'JJ';
    return `<div class="admin-row">
      <div class="admin-top">
        <div class="admin-emoji" onclick="openEmoji('${t.id}')">${d.emoji}</div>
        <div class="admin-fields">
          <input class="name" type="text" value="${escapeHtml(d.name)}" oninput="adminSet('${t.id}','name',this.value)" placeholder="Tracker name"/>
          <input type="text" value="${escapeHtml(d.subtitle)}" oninput="adminSet('${t.id}','subtitle',this.value)" placeholder="Subtitle"/>
        </div>
      </div>
      <div class="admin-labels">
        ${t.mode==='dog'?`
        <label class="al"><span>Unit (e.g. session)</span><input type="text" value="${escapeHtml(d.act1||'')}" oninput="adminSet('${t.id}','act1',this.value)"/></label>
        <label class="al"><span>Levels</span><span class="lvl-pick">${[2,3].map(v=>`<button class="lvl-btn ${(d.lvls||2)===v?'on':''}" onclick="adminSetLvls('${t.id}',${v})">${v}</button>`).join('')}</span></label>
        `:`
        <label class="al"><span>Level 1 label</span><input type="text" value="${escapeHtml(d.act1||'')}" oninput="adminSet('${t.id}','act1',this.value)"/></label>
        <label class="al"><span>Level 2 label</span><input type="text" placeholder="optional" value="${escapeHtml(d.act2||'')}" oninput="adminSet('${t.id}','act2',this.value)"/></label>
        <label class="al"><span>Level 3 label</span><input type="text" placeholder="optional" value="${escapeHtml(d.act3||'')}" oninput="adminSet('${t.id}','act3',this.value)"/></label>
        `}
        <label class="al"><span>Note prompt</span><input type="text" value="${escapeHtml(d.notePh||'')}" oninput="adminSet('${t.id}','notePh',this.value)"/></label>
      </div>
      <div class="admin-actions">
        <span class="a-mode">${t.mode} · ${ownerTag}</span>
        ${custom?`<button class="admin-del" onclick="deleteTracker('${t.id}')">Delete</button>`:(hasOvr?`<button class="admin-reset" onclick="resetTracker('${t.id}')">Reset to default</button>`:'')}
      </div>
    </div>`;
  }).join('');
}
function adminSet(id,field,val){adminDraft[id]=adminDraft[id]||{};adminDraft[id][field]=val;adminDirty=true;markAdminDirty();}
function adminSetHome(val){adminHomeTitleDraft=val;adminDirty=true;markAdminDirty();}
function adminSetLvls(id,v){adminDraft[id]=adminDraft[id]||{};adminDraft[id].lvls=v;adminDirty=true;markAdminDirty();renderAdminList();}
function markAdminDirty(){const btn=document.getElementById('save-btn');if(btn){btn.classList.add('dirty');btn.classList.remove('saved');btn.textContent='Save changes';}}
function saveAdmin(){
  const ov=loadOvr();
  Object.keys(adminDraft).forEach(id=>{
    const base=baseOf(id);if(!base)return;
    const d=adminDraft[id];const def=baseActs(base);const o={};
    ['name','subtitle','emoji'].forEach(f=>{if(d[f]!==undefined && (d[f]||'')!==(base[f]||'')) o[f]=d[f];});
    ['act1','act2','act3','notePh'].forEach(f=>{if(d[f]!==undefined && (d[f]||'')!==(def[f]||'')) o[f]=d[f];});
    if(d.lvls!==undefined && d.lvls!==def.lvls) o.lvls=d.lvls;
    if(Object.keys(o).length)ov[id]=o;else delete ov[id];
  });
  jset(OVR_KEY,ov);
  jset(HOME_TITLE_KEY,(adminHomeTitleDraft||'Family Training').trim()||'Family Training');
  adminDirty=false;
  const btn=document.getElementById('save-btn');if(btn){btn.classList.remove('dirty');btn.classList.add('saved');btn.textContent='Saved ✓';setTimeout(()=>{if(!adminDirty){btn.classList.remove('saved');btn.textContent='Save changes';}},1500);}
  renderAdminList();
}
function leaveAdmin(){
  if(adminDirty&&!confirm('You have unsaved changes. Leave without saving?'))return;
  location.hash='';
}
function resetTracker(id){const ov=loadOvr();delete ov[id];jset(OVR_KEY,ov);const b=baseOf(id);if(b){const def=baseActs(b);adminDraft[id]={name:b.name,subtitle:b.subtitle,emoji:b.emoji,act1:def.act1,act2:def.act2,act3:def.act3,notePh:def.notePh,lvls:def.lvls};}renderAdminList();}
function deleteTracker(id){
  if(!confirm('Delete this tracker? Its logged data stays saved but it disappears from your list.'))return;
  const c=loadCustom().filter(x=>x.id!==id);jset(CUSTOM_KEY,c);
  const ov=loadOvr();delete ov[id];jset(OVR_KEY,ov);
  delete adminDraft[id];
  renderAdminList();
}
function onSaveClick(){if(route().view==='admin')saveAdmin();else saveDay();}

/* ----- Emoji editor (used by admin) ----- */
const EMOJIS=['🔥','💪','🐕','🏃','🥗','🧘','📚','🌍','🎸','🎨','⚽','🏋️','🧠','💧','📝','💰','🍳','🚴','🥊','🧗','🎯','⛹️'];
let emojiForId=null;
function openEmoji(id){
  emojiForId=id;const t=getTracker(id);const cur=(adminDraft[id]&&adminDraft[id].emoji)||t.emoji;
  document.getElementById('emoji-for').textContent=t.name;
  document.getElementById('emoji-grid').innerHTML=EMOJIS.map(e=>`<div class="chip emoji-chip ${e===cur?'sel':''}" onclick="setEmoji('${e}')">${e}</div>`).join('');
  openSheet('emoji-sheet');
}
function setEmoji(e){if(route().view==='admin'){adminSet(emojiForId,'emoji',e);closeSheet('emoji-sheet');renderAdminList();}else{closeSheet('emoji-sheet');}}

/* ----- Add tracker ----- */
const MODES=[
  {v:'fitness',label:'Checklist',hint:'Tick off 1–3 things each day. The more boxes you add and hit, the higher the level.'},
  {v:'dog',label:'Sessions',hint:'Count repeats in a day (sessions, walks…). Choose 2 or 3 levels.'},
];
const COLORS=['#0d6e6b','#c2410c','#7c3aed','#2563eb','#be185d','#15803d','#0891b2','#a16207'];
const OWNERS=[{v:'me',label:'JJ'},{v:'nithya',label:"Nithya's"}];
let pick={emoji:'🌍',mode:'simple',color:'#2563eb',owner:'me'};
function openAdd(){
  pick={emoji:'🌍',mode:'fitness',color:'#2563eb',owner:'me',lvls:2};
  document.getElementById('m-name').value='';document.getElementById('m-sub-input').value='';
  document.getElementById('m-owner-row').innerHTML=OWNERS.map(o=>`<div class="chip ${o.v===pick.owner?'sel':''}" data-owner="${o.v}" onclick="pOwner('${o.v}')">${o.label}</div>`).join('');
  document.getElementById('m-emoji-row').innerHTML=EMOJIS.map(e=>`<div class="chip emoji-chip ${e===pick.emoji?'sel':''}" onclick="pEmoji('${e}')">${e}</div>`).join('');
  document.getElementById('m-mode-row').innerHTML=MODES.map(m=>`<div class="chip ${m.v===pick.mode?'sel':''}" data-mode="${m.v}" onclick="pMode('${m.v}')">${m.label}</div>`).join('');
  document.getElementById('m-color-row').innerHTML=COLORS.map(c=>`<div class="color-chip ${c===pick.color?'sel':''}" data-color="${c}" style="background:${c}" onclick="pColor('${c}')"></div>`).join('');
  document.getElementById('m-mode-hint').textContent=MODES.find(m=>m.v===pick.mode).hint;
  document.getElementById('m-act1').value='';document.getElementById('m-act2').value='';document.getElementById('m-act3').value='';document.getElementById('m-unit').value='';document.getElementById('m-noteph').value='';
  renderLvlsRow();updateAddLabels();
  openSheet('add-sheet');
}
function renderLvlsRow(){document.getElementById('m-lvls-row').innerHTML=[2,3].map(v=>`<div class="chip ${pick.lvls===v?'sel':''}" data-lvls="${v}" onclick="pLvls(${v})">${v} levels</div>`).join('');}
function pLvls(v){pick.lvls=v;renderLvlsRow();}
function pEmoji(e){pick.emoji=e;document.querySelectorAll('#m-emoji-row .emoji-chip').forEach(c=>c.classList.toggle('sel',c.textContent===e));}
function pMode(m){pick.mode=m;document.querySelectorAll('#m-mode-row [data-mode]').forEach(c=>c.classList.toggle('sel',c.dataset.mode===m));document.getElementById('m-mode-hint').textContent=MODES.find(x=>x.v===m).hint;updateAddLabels();}
function updateAddLabels(){
  const m=pick.mode;
  document.getElementById('m-check-fields').style.display=(m==='dog')?'none':'';
  document.getElementById('m-dog-fields').style.display=(m==='dog')?'':'none';
}
function pColor(c){pick.color=c;document.querySelectorAll('#m-color-row [data-color]').forEach(ch=>ch.classList.toggle('sel',ch.dataset.color===c));}
function pOwner(o){pick.owner=o;document.querySelectorAll('#m-owner-row [data-owner]').forEach(ch=>ch.classList.toggle('sel',ch.dataset.owner===o));}
function createTracker(){
  const name=document.getElementById('m-name').value.trim();
  if(!name){const el=document.getElementById('m-name');el.focus();el.style.borderColor='var(--danger)';return;}
  const sub=document.getElementById('m-sub-input').value.trim()||'Custom tracker';
  const id='c_'+name.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')+'_'+Date.now().toString(36);
  const notePh=document.getElementById('m-noteph').value.trim();
  const obj={id,name,subtitle:sub,emoji:pick.emoji,mode:pick.mode,accent:pick.color,owner:pick.owner||'me'};
  if(pick.mode==='dog'){
    obj.act1=document.getElementById('m-unit').value.trim()||'session';
    obj.lvls=pick.lvls||2;
  } else {
    obj.act1=document.getElementById('m-act1').value.trim()||'Done';
    obj.act2=document.getElementById('m-act2').value.trim();
    obj.act3=document.getElementById('m-act3').value.trim();
  }
  if(notePh)obj.notePh=notePh;
  const custom=loadCustom();custom.push(obj);jset(CUSTOM_KEY,custom);
  closeSheet('add-sheet');
  if(route().view==='admin')renderAdminList();else renderCards();
}

/* ----- Month picker ----- */
let mpMonth=null;
function openMonthPicker(){mpMonth=new Date(selDate.getFullYear(),selDate.getMonth(),1);renderMonthPicker();openSheet('month-sheet');}
function mpShift(delta){
  const nm=new Date(mpMonth.getFullYear(),mpMonth.getMonth()+delta,1);
  const firstAllowed=new Date(START.getFullYear(),START.getMonth(),1);
  const lastAllowed=new Date(END.getFullYear(),END.getMonth(),1);
  if(nm<firstAllowed||nm>lastAllowed)return;
  mpMonth=nm;renderMonthPicker();
}
function renderMonthPicker(){
  document.getElementById('mp-title').textContent=mpMonth.toLocaleDateString([],{month:'long',year:'numeric'});
  const firstAllowed=new Date(START.getFullYear(),START.getMonth(),1);
  const lastAllowed=new Date(END.getFullYear(),END.getMonth(),1);
  document.getElementById('mp-prev').disabled=(mpMonth<=firstAllowed);
  document.getElementById('mp-next').disabled=(mpMonth>=lastAllowed);
  const y=mpMonth.getFullYear(),m=mpMonth.getMonth();
  const dim=new Date(y,m+1,0).getDate();const startDow=new Date(y,m,1).getDay();
  const today=ymd(new Date());const sel=ymd(selDate);
  const dows=['S','M','T','W','T','F','S'].map(x=>`<div class="mp-dow">${x}</div>`).join('');
  let cells='';for(let i=0;i<startDow;i++)cells+=`<div class="mp-cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const date=new Date(y,m,d);date.setHours(0,0,0,0);const key=ymd(date);
    const oor=(date<START||date>END);
    const cls=['mp-cell',oor?'oor':'',key===sel?'sel':'',key===today?'today':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}" ${oor?'':`onclick="mpPick('${key}')"`}>${d}</div>`;
  }
  document.getElementById('mp-cal').innerHTML=dows+cells;
}
function mpPick(key){
  if(dirty&&!confirm('Unsaved changes on this day. Leave without saving?'))return;
  selDate=clampDate(parseYmd(key));_loadedFor=null;closeSheet('month-sheet');renderLog();
}
function mpJumpToday(){
  if(dirty&&!confirm('Unsaved changes on this day. Leave without saving?'))return;
  selDate=clampDate(new Date());_loadedFor=null;closeSheet('month-sheet');renderLog();
}

/* ----- Sheet helpers ----- */
function openSheet(id){document.getElementById(id).classList.add('show');}
function closeSheet(id){document.getElementById(id).classList.remove('show');}

enterRoute();
