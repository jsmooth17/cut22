<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Evening Log — Cut</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0c;--surf:#1c1a17;--surf2:#252320;
  --text:#ece9e2;--muted:#7a7368;--border:#2e2c28;
  --primary:#4f98a3;--prim-l:rgba(79,152,163,.15);
  --success:#52c41a;--succ-l:rgba(82,196,26,.15);--succ-b:rgba(82,196,26,.3);
  --gold:#f5c842;--gold-l:rgba(245,200,66,.12);
  --radius:14px;
}
html,body{height:100%;background:var(--bg)}
body{font-family:'DM Sans',sans-serif;color:var(--text);font-size:15px;line-height:1.5;min-height:100vh;padding:env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0)}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 48px}

.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.top-label{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.top-day{font-size:13px;font-weight:600;background:var(--surf2);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}

.hero{margin-bottom:24px}
.hero-night{font-size:clamp(1.8rem,7vw,2.6rem);font-weight:700;letter-spacing:-.02em;line-height:1;margin-bottom:4px}
.hero-sub{font-size:14px;color:var(--muted)}

/* Big tap targets */
.check-group{display:grid;gap:10px;margin-bottom:20px}
.check-item{display:flex;align-items:center;gap:14px;padding:16px;background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none}
.check-item:active{transform:scale(.98)}
.check-item.checked{background:var(--succ-l);border-color:var(--succ-b)}
.check-item.checked.gold{background:var(--gold-l);border-color:rgba(245,200,66,.35)}
.check-icon{width:28px;height:28px;border-radius:8px;border:2px solid var(--border);background:var(--surf2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:all .15s}
.check-item.checked .check-icon{background:var(--success);border-color:var(--success)}
.check-item.checked.gold .check-icon{background:var(--gold);border-color:var(--gold)}
.check-label{font-weight:600;font-size:15px}
.check-sub{font-size:12px;color:var(--muted);margin-top:2px}
.check-item.checked .check-sub{color:var(--success);opacity:.8}
.check-item.checked.gold .check-sub{color:var(--gold);opacity:.9}

/* Water stepper */
.water-card{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.water-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.water-title{font-weight:600;font-size:15px}
.water-val{font-size:22px;font-weight:700;color:var(--primary)}
.water-drops{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.wdrop{font-size:22px;opacity:.2;transition:opacity .2s;cursor:pointer}
.wdrop.on{opacity:1}
.water-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wbtn{padding:13px;border-radius:10px;border:1.5px solid var(--border);background:var(--surf2);font-size:20px;font-weight:700;cursor:pointer;color:var(--text);transition:all .15s;-webkit-tap-highlight-color:transparent}
.wbtn:active{transform:scale(.96)}

/* Minutes stepper */
.min-card{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.min-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.min-title{font-weight:600;font-size:15px}
.min-val{font-size:22px;font-weight:700;color:var(--primary)}
.min-btns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.mbtn{padding:12px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--surf2);font-size:13px;font-weight:700;cursor:pointer;color:var(--text);text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.mbtn:active{transform:scale(.95)}
.mbtn.active{background:var(--primary);border-color:var(--primary);color:#fff}

/* Save button */
.save-btn{width:100%;padding:18px;border-radius:var(--radius);border:none;background:var(--primary);color:#fff;font-size:17px;font-weight:700;cursor:pointer;transition:all .15s;margin-bottom:12px;-webkit-tap-highlight-color:transparent;letter-spacing:.01em}
.save-btn:active{transform:scale(.98);filter:brightness(.9)}
.save-btn.saved{background:#2a5c06;color:#a8f074}
.dashboard-link{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;border-radius:var(--radius);border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;text-decoration:none;transition:all .15s}
.dashboard-link:hover{color:var(--text)}

/* Score badge */
.score-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surf);border:1px solid var(--border);border-radius:11px;margin-bottom:20px}
.score-dots{display:flex;gap:5px}
.score-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .2s}
.score-dot.on{background:var(--success)}
.score-dot.on.gold{background:var(--gold)}
.score-label{font-size:12px;color:var(--muted);margin-left:4px}

.off-plan{text-align:center;padding:60px 20px;color:var(--muted)}
.off-plan .big{font-size:48px;margin-bottom:12px}

.section-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span class="top-label">🌙 Evening Log</span>
    <span class="top-day" id="top-day">Day —</span>
  </div>
  <div id="content"></div>
</div>

<script>
const CUT_START = new Date(2025, 4, 16);
const STORE_KEY = 'cut22_v1';

const PLAN_TYPES = ['Upper Strength','Cardio','Lower Strength','Conditioning','Chest Day','Cardio','Full Body','Upper Pull','Cardio','Lower Strength','Conditioning','Chest Day','Cardio','Active Recovery','Upper Strength','Cardio','Lower Power','Full Body','Chest Day','Cardio','Athletic','Final Test'];

function getDayNum(){
  const param = new URLSearchParams(location.search).get('day');
  if(param){ const n = parseInt(param); if(n>=1&&n<=22) return n; }
  const now = new Date();
  const diff = Math.floor((now - CUT_START) / 86400000);
  return diff >= 0 && diff < 22 ? diff + 1 : null;
}

function loadSaved(){ try{ const d=localStorage.getItem(STORE_KEY); return d?JSON.parse(d):{}; }catch(e){return {};} }
function writeSaved(obj){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(obj)); }catch(e){} }

// State
let state = { workout:false, protein:false, meals:false, steps:false, water:0, minutes:30 };
let isSaved = false;

function render(){
  const dayNum = getDayNum();
  if(!dayNum){
    document.getElementById('content').innerHTML = `<div class="off-plan"><div class="big">🏁</div><p>No active cut day.</p></div>`;
    return;
  }

  const saved = loadSaved();
  const existing = saved[dayNum] || {};
  // Pre-fill from any previously saved data
  if(existing.workout !== undefined) state.workout = existing.workout;
  if(existing.protein !== undefined) state.protein = existing.protein;
  if(existing.meals !== undefined) state.meals = existing.meals;
  if(existing.steps !== undefined) state.steps = existing.steps;
  if(existing.water !== undefined) state.water = existing.water;
  if(existing.minutes !== undefined) state.minutes = existing.minutes;

  const type = PLAN_TYPES[dayNum-1];
  const now = new Date();
  const dateStr = now.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'});
  document.getElementById('top-day').textContent = `Day ${dayNum} of 22`;

  document.getElementById('content').innerHTML = `
    <div class="hero">
      <div class="hero-night">How'd it go?</div>
      <div class="hero-sub">${dateStr} · ${type}</div>
    </div>

    <div class="score-bar">
      <div class="score-dots">
        <div class="score-dot ${state.workout?'on':''}" id="sd-workout"></div>
        <div class="score-dot ${state.protein?'on':''}" id="sd-protein"></div>
        <div class="score-dot ${state.meals?'on':''}" id="sd-meals"></div>
        <div class="score-dot ${state.steps?'on':''}" id="sd-steps"></div>
      </div>
      <span class="score-label" id="score-label">${countScore()}/4 today</span>
    </div>

    <div class="section-label">Tap to mark done</div>
    <div class="check-group">
      <div class="check-item ${state.workout?'gold':''} ${state.workout?'checked':''}" id="ci-workout" onclick="toggle('workout')">
        <div class="check-icon" id="ico-workout">${state.workout?'✓':''}</div>
        <div><div class="check-label">💪 Workout done</div><div class="check-sub" id="sub-workout">${state.workout?'Logged ✓':'Did you train today?'}</div></div>
      </div>
      <div class="check-item ${state.protein?'gold':''} ${state.protein?'checked':''}" id="ci-protein" onclick="toggle('protein')">
        <div class="check-icon" id="ico-protein">${state.protein?'✓':''}</div>
        <div><div class="check-label">🥩 Protein hit (170g)</div><div class="check-sub" id="sub-protein">${state.protein?'Logged ✓':'Did you hit your goal?'}</div></div>
      </div>
      <div class="check-item ${state.meals?'checked':''}" id="ci-meals" onclick="toggle('meals')">
        <div class="check-icon" id="ico-meals">${state.meals?'✓':''}</div>
        <div><div class="check-label">🥗 Meals on plan</div><div class="check-sub" id="sub-meals">${state.meals?'Logged ✓':'Stuck to the meal plan?'}</div></div>
      </div>
      <div class="check-item ${state.steps?'checked':''}" id="ci-steps" onclick="toggle('steps')">
        <div class="check-icon" id="ico-steps">${state.steps?'✓':''}</div>
        <div><div class="check-label">🏃 Steps / cardio goal</div><div class="check-sub" id="sub-steps">${state.steps?'Logged ✓':'Hit your step target?'}</div></div>
      </div>
    </div>

    <div class="section-label">Intense minutes</div>
    <div class="min-card">
      <div class="min-top">
        <span class="min-title">⏱ Active time</span>
        <span class="min-val" id="min-display">${state.minutes} min</span>
      </div>
      <div class="min-btns">
        <div class="mbtn ${state.minutes===20?'active':''}" onclick="setMin(20)">20</div>
        <div class="mbtn ${state.minutes===30?'active':''}" onclick="setMin(30)">30</div>
        <div class="mbtn ${state.minutes===45?'active':''}" onclick="setMin(45)">45</div>
        <div class="mbtn ${state.minutes===60?'active':''}" onclick="setMin(60)">60+</div>
      </div>
    </div>

    <div class="section-label">Water</div>
    <div class="water-card">
      <div class="water-top">
        <span class="water-title">💧 Drops today</span>
        <span class="water-val" id="water-display">${state.water} / 8</span>
      </div>
      <div class="water-drops" id="water-drops"></div>
      <div class="water-btns">
        <button class="wbtn" onclick="addWater(-1)">−</button>
        <button class="wbtn" onclick="addWater(1)">+</button>
      </div>
    </div>

    <button class="save-btn ${isSaved?'saved':''}" id="save-btn" onclick="saveLog(${dayNum})">
      ${isSaved ? '✓ Saved to dashboard' : 'Save & Sync →'}
    </button>
    <a class="dashboard-link" href="morning.html">☀️ Morning brief</a>
    <a class="dashboard-link" href="cut22.html" style="margin-top:6px">↗ Full dashboard</a>
  `;
  renderDrops();
}

function countScore(){ return [state.workout,state.protein,state.meals,state.steps].filter(Boolean).length; }

function toggle(key){
  state[key] = !state[key];
  isSaved = false;
  rerender();
}

function setMin(v){
  state.minutes = v;
  isSaved = false;
  rerender();
}

function addWater(delta){
  state.water = Math.max(0, Math.min(10, state.water + delta));
  isSaved = false;
  rerender();
}

function renderDrops(){
  const el = document.getElementById('water-drops');
  if(!el) return;
  el.innerHTML = Array.from({length:8},(_,i)=>`<span class="wdrop ${i<state.water?'on':''}" onclick="addWater(${i<state.water?-1:1})">${i<state.water?'💧':'○'}</span>`).join('');
}

function rerender(){
  // Update score dots
  ['workout','protein','meals','steps'].forEach(k=>{
    const dot = document.getElementById('sd-'+k);
    const ci = document.getElementById('ci-'+k);
    const ico = document.getElementById('ico-'+k);
    const sub = document.getElementById('sub-'+k);
    if(!dot) return;
    dot.className = 'score-dot'+(state[k]?' on'+(k==='workout'||k==='protein'?' gold':''):'');
    ci.className = 'check-item'+(state[k]?' checked'+(k==='workout'||k==='protein'?' gold':''):'');
    ico.textContent = state[k]?'✓':'';
    const labels = {workout:'Did you train today?',protein:'Did you hit your goal?',meals:'Stuck to the meal plan?',steps:'Hit your step target?'};
    sub.textContent = state[k]?'Logged ✓':labels[k];
    sub.style.color = '';
  });
  document.getElementById('score-label').textContent = `${countScore()}/4 today`;
  document.getElementById('water-display').textContent = `${state.water} / 8`;
  document.getElementById('min-display').textContent = `${state.minutes} min`;
  // update minute buttons
  document.querySelectorAll('.mbtn').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === state.minutes || (b.textContent==='60+' && state.minutes===60));
  });
  const btn = document.getElementById('save-btn');
  if(btn){ btn.className = 'save-btn'+(isSaved?' saved':''); btn.textContent = isSaved?'✓ Saved to dashboard':'Save & Sync →'; }
  renderDrops();
}

function saveLog(dayNum){
  const saved = loadSaved();
  const existing = saved[dayNum] || {};
  const score = countScore();
  const now = new Date();
  const dow = now.toLocaleDateString([],{weekday:'long'});
  const dateStr = now.toLocaleDateString([],{month:'short',day:'numeric'});
  const type = PLAN_TYPES[dayNum-1];

  const entry = {
    ...existing,
    workout: state.workout,
    protein: state.protein,
    meals: state.meals,
    steps: state.steps,
    water: state.water,
    minutes: state.minutes,
    score,
    date: dateStr,
    dow,
    workoutText: type,
    log: [
      `Day ${dayNum} · ${dateStr} · ${dow}`,
      `Workout: ${type}`,
      `─────────────────────`,
      `✓ Workout done: ${state.workout?'Yes':'No'}`,
      `✓ Protein hit: ${state.protein?'Yes':'No'}`,
      `✓ Meals on plan: ${state.meals?'Yes':'No'}`,
      `✓ Steps goal: ${state.steps?'Yes':'No'}`,
      `─────────────────────`,
      `Water: ${state.water}/8 drops (~${Math.round(state.water*350)}ml)`,
      `Minutes: ${state.minutes}`,
      `Logged via evening brief.`
    ].join('\n')
  };

  saved[dayNum] = entry;
  writeSaved(saved);
  isSaved = true;
  rerender();

  // Brief haptic if available
  if(navigator.vibrate) navigator.vibrate([30,20,30]);
}

render();
</script>
</body>
</html>
